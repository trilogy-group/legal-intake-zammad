name: CI

on:
  pull_request:
    branches:
      - main
      - stable

jobs:
  CI:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_group: [1, 2, 3, 4, 5, 6]
    container:
      image: zammad/zammad-ci:latest
    services:
      postgresql:
        image: postgres:18
        env:
          POSTGRES_USER: zammad
          POSTGRES_PASSWORD: zammad
      redis:
        image: redis:6
    env:
      RAILS_ENV: test
      Z_LOCALES: "en-us:de-de"
      TZ: 'Europe/London'
      REDIS_URL: redis://redis:6379
      TEST_GROUP: ${{ matrix.test_group }}
      # Compile assets only once.
      CI_SKIP_ASSETS_PRECOMPILE: 'true'
      # Avoid unnecessary DB resets.
      CI_SKIP_DB_RESET: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Cache Rubygems
        id: cache-bundler
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-cache-bundler-${{ hashFiles('Gemfile.lock') }}
      - name: Pre
        run: .github/workflows/ci/pre.sh
      - name: Cache ESLint
        id: cache-eslint
        uses: actions/cache@v5
        with:
          path: tmp/cache/.eslintcache.js
          key: ${{ runner.os }}-cache-eslint-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Cache compiled assets
        id: cache-assets
        uses: actions/cache@v5
        with:
          path: |
            public/assets
            public/packs
            tmp/cache/assets
          key: ${{ runner.os }}-assets-${{ hashFiles('**/pnpm-lock.yaml', 'app/assets/**/*', 'app/frontend/**/*') }}
          restore-keys: |
            ${{ runner.os }}-assets-
      - name: Cache test database
        id: cache-test-db
        uses: actions/cache@v5
        with:
          path: |
            tmp/cache
            spec/examples.txt
          key: ${{ runner.os }}-test-db-${{ hashFiles('db/schema.rb', 'db/seeds.rb') }}
          restore-keys: |
            ${{ runner.os }}-test-db-
      - name: Lint
        run: .github/workflows/ci/lint.sh
      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: |
            *.md
            **/*.md
            #node_modules
            #**/node_modules
            #vendor
      - name: Test
        run: .github/workflows/ci/test.sh
