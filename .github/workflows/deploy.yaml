name: build-and-deploy

# Builds the arm64 Zammad image on push to staging/main, pushes to ECR, then
# deploys it in-place to the matching EC2 box via SSM RunCommand and persists the
# tag to /intake/<env>/zammad/version so a future instance replacement boots the
# same image.
#
#   push to staging -> tag staging-<sha>-arm64        -> deploy to zammad-staging
#   push to main    -> tag main-<sha>-arm64 + :latest -> deploy to zammad-prod
#
# Migrations ride along: `docker compose up -d` starts the zammad-init container
# which runs `rails db:migrate` automatically. There is NO separate migration step.
#
# Replaces the old ecr-release.yaml (build-only, manual VERSION bump on the box).

on:
  push:
    branches:
      - main
      - staging
    # Docs-only changes must not trigger an image rebuild + prod redeploy.
    paths-ignore:
      - '**/*.md'
      - 'AGENTS.md'
      - '.dev/ai-agent-instructions.md'
      - 'docs/**'

# One deploy at a time per environment. A second push to the same branch waits
# for the first to finish instead of racing the same box (the Zammad analogue of
# the app repo's CloudFormation stack-lock race). We do NOT cancel-in-progress:
# a half-finished container swap should complete, not be killed mid-flight.
concurrency:
  group: zammad-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write   # auto-create GitHub Deployment records via the `environment:` key below

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    # Declaring an environment makes GitHub auto-create a Deployment record
    # (status in_progress → success/failure) → populates the repo "Deployments"
    # widget + per-environment history. main → production, staging → staging.
    # These environments have no protection rules (pure tracking), matching the
    # legal-intake app repo; add required-reviewers here later for a prod gate.
    environment:
      # name only — no `url:`. GitHub refuses to render a computed (expression)
      # environment URL when the environment holds secrets ("Skip setting
      # environment url ... may contain secret"), so the link never showed anyway.
      # The Deployments widget + per-env history still work from the name alone.
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Resolve environment + image tag
        id: vars
        run: |
          set -euo pipefail
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY_NAME }}"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          BRANCH_NAME="$(echo "${GITHUB_REF#refs/heads/}" | sed 's/\//-/g')"
          TAG="${BRANCH_NAME}-${SHORT_SHA}-arm64"

          # Branch -> environment + instance Name tag mapping.
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            ENV_NAME="prod"
            INSTANCE_TAG="zammad-prod"
          else
            ENV_NAME="staging"
            INSTANCE_TAG="zammad-staging"
          fi

          # Detect whether any runtime-config JSON for THIS env changed in the
          # pushed range → gates the post-deploy auto-apply step. Non-fatal: if
          # the diff base is unavailable, default to applying (safe: idempotent).
          CONFIG_CHANGED=false
          # Detect whether anything IMAGE-relevant changed (anything NOT under
          # zammad-config/). Config JSON does not ride the Docker image, so a
          # config-only merge must SKIP the expensive build+push+SSM-deploy and
          # go straight to the config apply. Default true if no usable diff base.
          IMAGE_CHANGED=false
          BEFORE="${{ github.event.before }}"
          if [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${BEFORE}" 2>/dev/null; then
            CHANGED="$(git diff --name-only "${BEFORE}" "${GITHUB_SHA}")"
            echo "Changed files:"; echo "${CHANGED}"
            if echo "${CHANGED}" | grep -qE "^zammad-config/${ENV_NAME}/.*\.json$"; then
              CONFIG_CHANGED=true
            fi
            # image-relevant = any changed file outside zammad-config/
            if echo "${CHANGED}" | grep -qvE "^zammad-config/"; then
              IMAGE_CHANGED=true
            fi
          else
            echo "No usable diff base (${BEFORE}) — building + applying config to be safe."
            CONFIG_CHANGED=true
            IMAGE_CHANGED=true
          fi

          {
            echo "image_uri=${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"
            echo "registry=${ECR_REGISTRY}"
            echo "repository=${ECR_REPOSITORY}"
            echo "tag=${TAG}"
            echo "env_name=${ENV_NAME}"
            echo "instance_tag=${INSTANCE_TAG}"
            echo "config_changed=${CONFIG_CHANGED}"
            echo "image_changed=${IMAGE_CHANGED}"
          } >> "$GITHUB_OUTPUT"
          echo "Building ${TAG} for ${ENV_NAME} (${INSTANCE_TAG}); image_changed=${IMAGE_CHANGED} config_changed=${CONFIG_CHANGED}"

      - name: Build and push (main → versioned + latest)
        if: github.ref == 'refs/heads/main' && steps.vars.outputs.image_changed == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          pull: true
          push: true
          tags: |
            ${{ steps.vars.outputs.image_uri }}
            ${{ steps.vars.outputs.registry }}/${{ steps.vars.outputs.repository }}:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (staging → versioned only)
        if: github.ref != 'refs/heads/main' && steps.vars.outputs.image_changed == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          pull: true
          push: true
          tags: ${{ steps.vars.outputs.image_uri }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Persist image tag to SSM version param
        if: steps.vars.outputs.image_changed == 'true'
        run: |
          set -euo pipefail
          aws ssm put-parameter \
            --name "/intake/${{ steps.vars.outputs.env_name }}/zammad/version" \
            --type String --overwrite \
            --value "${{ steps.vars.outputs.tag }}" \
            --region "${{ secrets.AWS_REGION }}"
          echo "Persisted /intake/${{ steps.vars.outputs.env_name }}/zammad/version = ${{ steps.vars.outputs.tag }}"

      - name: Resolve target instance id
        id: target
        if: steps.vars.outputs.image_changed == 'true'
        run: |
          set -euo pipefail
          IID="$(aws ec2 describe-instances \
            --region "${{ secrets.AWS_REGION }}" \
            --filters "Name=tag:Name,Values=${{ steps.vars.outputs.instance_tag }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)"
          if [ -z "$IID" ] || [ "$(echo "$IID" | wc -w)" -ne 1 ]; then
            echo "::error::Expected exactly one running ${{ steps.vars.outputs.instance_tag }} instance, got: '$IID'"
            exit 1
          fi
          echo "instance_id=${IID}" >> "$GITHUB_OUTPUT"
          echo "Target instance: ${IID}"

      - name: Deploy via SSM RunCommand
        id: ssm
        if: steps.vars.outputs.image_changed == 'true'
        env:
          TAG: ${{ steps.vars.outputs.tag }}
          REGISTRY: ${{ steps.vars.outputs.registry }}
          REGION: ${{ secrets.AWS_REGION }}
          IID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          # Remote script run on the box. NOTE: SSM AWS-RunShellScript executes
          # under /bin/sh (dash), so NO `pipefail` here — use `set -eu` only.
          # Logs into ECR, pulls the exact tag, recreates containers (zammad-init
          # runs migrations), prunes old images.
          cat > /tmp/remote.sh <<EOF
          set -eu
          cd /opt/intake-zammad
          export VERSION="${TAG}"
          aws ecr get-login-password --region ${REGION} | docker login --username AWS --password-stdin ${REGISTRY}
          docker compose pull zammad-railsserver zammad-init zammad-scheduler zammad-websocket zammad-nginx
          docker compose up -d
          docker image prune -f
          EOF

          # Build the SSM parameters as a proper JSON array of lines (jq split),
          # passed via file:// — avoids CLI newline-mangling of a heredoc string.
          jq -Rs '{commands: split("\n")}' /tmp/remote.sh > /tmp/ssm-deploy.json

          CMD_ID="$(aws ssm send-command \
            --region "${REGION}" \
            --instance-ids "${IID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Zammad ${TAG}" \
            --parameters file:///tmp/ssm-deploy.json \
            --timeout-seconds 900 \
            --query "Command.CommandId" --output text)"
          echo "SSM command: ${CMD_ID}"
          echo "command_id=${CMD_ID}" >> "$GITHUB_OUTPUT"

          # Poll until the command reaches a terminal state (max ~15 min).
          for i in $(seq 1 90); do
            sleep 10
            STATUS="$(aws ssm get-command-invocation \
              --region "${REGION}" --command-id "${CMD_ID}" --instance-id "${IID}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")"
            echo "  [$i] status=${STATUS}"
            case "${STATUS}" in
              Success) echo "SSM command succeeded"; break ;;
              Failed|Cancelled|TimedOut)
                echo "::error::SSM deploy ended: ${STATUS}"
                echo "--- stdout ---"
                aws ssm get-command-invocation --region "${REGION}" \
                  --command-id "${CMD_ID}" --instance-id "${IID}" \
                  --query "StandardOutputContent" --output text || true
                echo "--- stderr ---"
                aws ssm get-command-invocation --region "${REGION}" \
                  --command-id "${CMD_ID}" --instance-id "${IID}" \
                  --query "StandardErrorContent" --output text || true
                exit 1 ;;
            esac
            if [ "$i" -eq 90 ]; then echo "::error::SSM deploy timed out"; exit 1; fi
          done

      - name: Health check
        if: steps.vars.outputs.image_changed == 'true'
        env:
          REGION: ${{ secrets.AWS_REGION }}
          IID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          # Remote health script (dash on the box → `set -eu`, no pipefail).
          # Poll the nginx container inside the box for HTTP < 500 (Rails up).
          cat > /tmp/health.sh <<'EOF'
          set -eu
          cd /opt/intake-zammad
          for i in $(seq 1 30); do
            CODE=$(docker compose exec -T zammad-nginx curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8080/ 2>/dev/null || echo "000")
            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 500 ]; then echo "healthy: HTTP $CODE"; exit 0; fi
            echo "  health $i/30: HTTP $CODE"; sleep 10
          done
          echo "unhealthy after 5min"; exit 1
          EOF
          jq -Rs '{commands: split("\n")}' /tmp/health.sh > /tmp/ssm-health.json

          CMD_ID="$(aws ssm send-command --region "${REGION}" --instance-ids "${IID}" \
            --document-name "AWS-RunShellScript" --comment "Zammad health check" \
            --parameters file:///tmp/ssm-health.json \
            --timeout-seconds 600 --query "Command.CommandId" --output text)"
          for i in $(seq 1 40); do
            sleep 10
            STATUS="$(aws ssm get-command-invocation --region "${REGION}" \
              --command-id "${CMD_ID}" --instance-id "${IID}" --query "Status" --output text 2>/dev/null || echo "Pending")"
            case "${STATUS}" in
              Success) echo "Health check passed"; exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "::error::Health check ${STATUS}"
                aws ssm get-command-invocation --region "${REGION}" \
                  --command-id "${CMD_ID}" --instance-id "${IID}" \
                  --query "StandardOutputContent" --output text || true
                exit 1 ;;
            esac
          done
          echo "::error::Health check poll timed out"; exit 1

      # --- Auto-apply runtime config (config-as-code) -------------------------
      # Runs ONLY when a zammad-config/<env>/*.json changed in this push. Applies
      # the FULL ordered, NON-DESTRUCTIVE config set to the just-deployed box via
      # scripts/ci-apply-all-config.sh (object-attributes + object-manager
      # migration first, then the rest in dependency order). Credentials come
      # from the GitHub Environment secrets (auto-selected by the job's
      # environment: key). Idempotent — reports "unchanged" where nothing moved.
      - name: Set up pnpm
        if: steps.vars.outputs.config_changed == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6 (Node24)
        # version omitted → action-setup uses the packageManager pin in package.json (pnpm@10.x)

      - name: Set up Node
        if: steps.vars.outputs.config_changed == 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install config-script deps
        if: steps.vars.outputs.config_changed == 'true'
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Apply Zammad runtime config
        if: steps.vars.outputs.config_changed == 'true'
        env:
          ZAMMAD_URL: ${{ secrets.ZAMMAD_URL }}
          ZAMMAD_TOKEN: ${{ secrets.ZAMMAD_TOKEN }}
        run: |
          set -euo pipefail
          echo "Config changed for ${{ steps.vars.outputs.env_name }} — applying (non-destructive)."
          bash scripts/ci-apply-all-config.sh "${{ steps.vars.outputs.env_name }}"
