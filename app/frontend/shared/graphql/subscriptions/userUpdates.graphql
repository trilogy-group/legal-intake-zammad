subscription userUpdates(
  $userId: ID!
  $secondaryOrganizationsCount: Int
  $initial: Boolean = false
) {
  userUpdates(userId: $userId, initial: $initial) {
    user {
      ...userDetailAttributes
      hasSecondaryOrganizations
      ticketsCount {
        open
        openSearchQuery
        closed
        closedSearchQuery
      }
      policy {
        update
      }
    }
  }
}
