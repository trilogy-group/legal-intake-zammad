fragment userDetailAttributes on User {
  id
  internalId
  firstname
  lastname
  fullname
  outOfOffice
  outOfOfficeStartAt
  outOfOfficeEndAt
  image
  email
  web
  vip
  phone
  mobile
  fax
  note
  source
  verified
  active
  objectAttributeValues {
    ...objectAttributeValues
  }
  organization {
    id
    internalId
    name
    active
    vip
    ticketsCount {
      open
      closed
    }
  }
  secondaryOrganizations(first: $secondaryOrganizationsCount, after: $after) {
    edges {
      node {
        id
        internalId
        active
        name
      }
    }
    pageInfo {
      endCursor
    }
    totalCount
  }
}
