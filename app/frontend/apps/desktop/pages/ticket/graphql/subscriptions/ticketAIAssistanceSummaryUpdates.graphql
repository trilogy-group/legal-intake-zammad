subscription ticketAIAssistanceSummaryUpdates($ticketId: ID!, $locale: String!) {
  ticketAIAssistanceSummaryUpdates(ticketId: $ticketId, locale: $locale) {
    summary {
      customerRequest
      conversationSummary
      openQuestions
      upcomingEvents
      customerMood
      customerEmotion
    }
    fingerprintMd5
    error {
      message
      exception
    }
    relevantForCurrentUser
  }
}
