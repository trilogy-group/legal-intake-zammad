mutation ticketAIAssistanceSummarize($ticketId: ID!) {
  ticketAIAssistanceSummarize(ticketId: $ticketId) {
    summary {
      customerRequest
      conversationSummary
      openQuestions
      upcomingEvents
      customerMood
      customerEmotion
    }
    fingerprintMd5
    relevantForCurrentUser
  }
}
